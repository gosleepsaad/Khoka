services:
  - type: web
    name: khoka
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/khoka.db
    disk:
      name: khoka-data
      mountPath: /opt/render/project/src
      sizeGB: 1
